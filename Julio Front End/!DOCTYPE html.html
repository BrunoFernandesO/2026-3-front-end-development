<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Site Simples</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f4f4f4;
      color: #333;
    }

    header {
      background: #007BFF;
      color: white;
      text-align: center;
      padding: 1rem;
    }

    main {
      padding: 2rem;
    }

    h1 {
      margin: 0;
    }

    p {
      line-height: 1.5;
    }

    button {
      background: #007BFF;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    footer {
      background: #333;
      color: white;
      text-align: center;
      padding: 1rem;
      margin-top: 2rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Bem-vindo ao meu site!</h1>
  </header>

  <main>
    <p>Este é um exemplo de site simples com HTML e CSS no mesmo arquivo.</p>
    <button>Clique aqui</button>
  </main>

  <footer>
    <p>&copy; 2025 - Meu Site</p>
  </footer>
</body>
</html>
